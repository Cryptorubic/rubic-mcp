name: Build and push to dockerhub

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Build and push to dockerhub'
        required: true
        default: 'build_and_push_to_docker'
        type: choice
        options:
          - build_and_push_to_docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get branch name
        id: get_branch
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
        shell: bash

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:${{ steps.get_branch.outputs.branch }}-latest

      - name: Notify team via telegram bot
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀🚀🚀 ${{ steps.get_branch.outputs.branch }} BRANCH IS UPDATED 🚀🚀🚀
            Rubic MCP ${{ steps.get_branch.outputs.branch }}-latest image is successfully build and pushed to Docker Hub.
            
            Repository: ${{ github.repository }}
            
            See changes: https://github.com/${{ github.repository }}/commit/${{github.sha}}
            
            Actor: ${{ github.actor }}.
